<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PO Bot Console - Admin</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
body, html { height: 100%; width: 100%; background: #0b0f19; overflow: hidden; }

/* หน้าจอโหลดข้อมูล */
#loading-screen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; justify-content: center; align-items: center;
    background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
    z-index: 999; transition: opacity 0.6s ease;
}

.card {
    text-align: center; color: white; padding: 40px 50px;
    border-radius: 24px; backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
    max-width: 90%; width: 360px;
}

.logo {
    width: 84px; height: 84px; margin: 0 auto 20px; border-radius: 50%;
    background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); /* เปลี่ยนสีเป็นสีม่วง Admin */
    display: flex; justify-content: center; align-items: center;
    font-size: 38px; box-shadow: 0 0 25px rgba(99, 102, 241, 0.4);
    animation: pulse 2s infinite ease-in-out;
}

h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
p { font-size: 13px; opacity: .6; letter-spacing: 0.05em; color: #a5b4fc; }

.loader {
    width: 100%; height: 6px; background: rgba(255, 255, 255, 0.08);
    border-radius: 10px; margin-top: 15px; position: relative; overflow: hidden;
}

.loader span {
    display: block; height: 100%; width: 0%;
    background: linear-gradient(90deg, #6366f1, #818cf8);
    border-radius: 10px; animation: fakeLoading 4s forwards;
}

#app-frame {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    border: none; z-index: 1; opacity: 0; transition: opacity 0.6s ease;
}

@keyframes fakeLoading { 0% { width: 0%; } 50% { width: 70%; } 100% { width: 92%; } }
@keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.06); } 100% { transform: scale(1); } }
</style>
</head>
<body>

<div id="loading-screen">
    <div class="card">
        <div class="logo">⚙️</div>
        <h1>เข้าสู่ระบบจัดการ</h1>
        <p>ADMIN CONSOLE</p>
        <div class="loader"><span id="progress-bar"></span></div>
    </div>
</div>

<!-- 🚀 เปลี่ยนลิ้งก์ iframe ด้านล่างนี้ โดยเอา ?page=alert ด้านหลังสุดออก -->
<iframe 
    id="app-frame" 
    src="https://script.google.com/macros/s/AKfycbyJdIx68ynNzg8W-jKNog3fRYaJrEjP1eh3IEGbtwV3zH8lPONl82xTPFNUFLr8G1pS1g/exec"
    scrolling="yes">
</iframe>

<script>
const iframe = document.getElementById('app-frame');
const loadingScreen = document.getElementById('loading-screen');
const progressBar = document.getElementById('progress-bar');

iframe.onload = function() {
    progressBar.style.animation = "none";
    progressBar.style.width = "100%";
    
    setTimeout(() => {
        loadingScreen.style.opacity = '0';
        iframe.style.opacity = '1';
        setTimeout(() => { loadingScreen.style.display = 'none'; }, 600);
    }, 400);
};
</script>

</body>
</html>
