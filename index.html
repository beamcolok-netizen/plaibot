<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PLAIBOT</title>

<style>
html,body{
    margin:0;
    height:100%;
}

#loading{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
    background:#0f172a;
    color:white;
}

iframe{
    width:100%;
    height:100vh;
    border:none;
    display:none;
}
</style>
</head>

<body>

<div id="loading">
    🚀 กำลังโหลดระบบ PLAIBOT...
</div>

<iframe
id="app"
src="https://script.google.com/macros/s/AKfycbyJdIx68ynNzg8W-jKNog3fRYaJrEjP1eh3IEGbtwV3zH8lPONl82xTPFNUFLr8G1pS1g/exec?page=alert">
</iframe>

<script>
const app = document.getElementById("app");

app.onload = () => {
    document.getElementById("loading").style.display = "none";
    app.style.display = "block";
};
</script>

</body>
</html>
